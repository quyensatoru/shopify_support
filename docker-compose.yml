services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: shopify_support
      POSTGRES_PASSWORD: shopify_support
      POSTGRES_DB: shopify_support
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U shopify_support']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
